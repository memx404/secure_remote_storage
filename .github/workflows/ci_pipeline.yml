name: Secure Remote Storage CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:

    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: securepassword123
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SRS_STORAGE: secure_storage_ci

      MONGO_HOST: localhost
      MONGO_PORT: "27017"
      MONGO_USER: admin
      MONGO_DB: srs_db
      MONGO_INITDB_ROOT_PASSWORD: securepassword123

      PYTHONUNBUFFERED: "1"

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Flake8 (Code Quality)
      run: |
        echo "Running flake8..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Tests
      run: |
        echo "Running pytest..."
        pytest -q
