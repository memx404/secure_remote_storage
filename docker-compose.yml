version: "3.8"

services:
  # 1) DATABASE
  mongo:
    image: mongo:latest
    container_name: srs_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - srs_network

  # 2) MONGO GUI
  mongo-express:
    image: mongo-express:latest
    container_name: srs_mongo_express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: securepassword123
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: user123
      ME_CONFIG_BASICAUTH_PASSWORD: userpass123
      ME_CONFIG_SITE_BASEURL: /
    ports:
      - "8081:8081"
    networks:
      - srs_network

  # 3) FLASK API SERVER
  web:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: srs_server
    depends_on:
      - mongo
    environment:
      - MONGO_INITDB_ROOT_PASSWORD=securepassword123
      - SRS_STORAGE=/app/secure_storage
    volumes:
      - secure_storage:/app/secure_storage
      - ./keys:/app/keys
    networks:
      - srs_network

  # 4) NGINX TLS REVERSE PROXY (public entrypoint)
  nginx:
    image: nginx:latest
    container_name: srs_proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - web
    networks:
      - srs_network

  # 5) AUTO-BANNER: prints endpoints automatically in logs
  banner:
    image: alpine:3.20
    depends_on:
      - nginx
      - mongo-express
    command: >
      sh -c '
        sleep 4;
        echo "";
        echo "--------------------------------------------------";
        echo " Secure Remote Storage System Started Successfully";
        echo "--------------------------------------------------";
        echo "";
        echo "Web (HTTPS via Nginx):";
        echo "  https://localhost";
        echo "";
        echo "API (Flask behind Nginx):";
        echo "  Health:     https://localhost/api/health";
        echo "";
        echo "press Cntrl+C to exit";
        echo "";
        echo "Mongo Express:";
        echo "  http://localhost:8081";
        echo "";
        echo "Stop everything:";
        echo "  docker compose down";
        echo "";
        echo "--------------------------------------------------";
        echo "";
        tail -f /dev/null
      '
    networks:
      - srs_network

networks:
  srs_network:
    driver: bridge

volumes:
  mongo_data:
  secure_storage:
