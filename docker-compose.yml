services:

  # 0) CERTIFICATE GENERATOR (creates TLS certs automatically if missing)
  cert-generator:
    image: alpine:3.20
    container_name: srs_cert_gen
    volumes:
      - ./nginx/certs:/certs
    command: >
      sh -c "
      if [ ! -f /certs/server.crt ]; then
        echo 'Generating self-signed TLS certificates...';
        apk add --no-cache openssl;
        openssl req -x509 -nodes -days 365 \
          -newkey rsa:2048 \
          -keyout /certs/server.key \
          -out /certs/server.crt \
          -subj '/CN=localhost';
      else
        echo 'TLS certificates already exist.';
      fi
      "
    restart: "no"

  # 1) DATABASE
  mongo:
    image: mongo:latest
    container_name: srs_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - srs_network

  # 2) MONGO GUI
  mongo-express:
    image: mongo-express:latest
    container_name: srs_mongo_express
    depends_on:
      - mongo
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: securepassword123
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: user123
      ME_CONFIG_BASICAUTH_PASSWORD: userpass123
      ME_CONFIG_SITE_BASEURL: /
    ports:
      - "8081:8081"
    networks:
      - srs_network

  # 3) FLASK API SERVER
  web:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: srs_server
    depends_on:
      - mongo
    environment:
      - MONGO_INITDB_ROOT_PASSWORD=securepassword123
      - SRS_STORAGE=/app/secure_storage
    volumes:
      - secure_storage:/app/secure_storage
      - ./keys:/app/keys
    networks:
      - srs_network

  # 4) NGINX TLS REVERSE PROXY
  nginx:
    image: nginx:latest
    container_name: srs_proxy
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - web
      - cert-generator
    networks:
      - srs_network

  # 5) STARTUP BANNER
  banner:
    image: alpine:3.20
    depends_on:
      - nginx
      - mongo-express
    command: >
      sh -c '
        sleep 4;
        echo "";
        echo "--------------------------------------------------";
        echo " Secure Remote Storage System Started Successfully";
        echo "--------------------------------------------------";
        echo "";
        echo "Web (HTTPS via Nginx):";
        echo "  https://localhost";
        echo "";
        echo "API Health:";
        echo "  https://localhost/api/health";
        echo "";
        echo "Mongo Express:";
        echo "  http://localhost:8081";
        echo "";
        echo "Stop everything:";
        echo "  docker compose down";
        echo "";
        echo "--------------------------------------------------";
        tail -f /dev/null
      '
    networks:
      - srs_network

networks:
  srs_network:
    driver: bridge

volumes:
  mongo_data:
  secure_storage:
